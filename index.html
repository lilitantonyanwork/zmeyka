<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header__content df j-spc-btw a-center">
                <div class="header__user df a-center">
                    <div class="user__avatar">
                        <img src="images/user.png" alt="user">
                    </div>
                    <div class="user__name">Эдвард</div>
                </div>
                <div class="header__points df a-center">
                    <img src="images/crystal.svg" alt="crystal">
                    <span>10</span>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section class="statistics">
            <div class="container">
                <div class="statistics__content df f-column ">
                    <h2 class="statistic__title">СТАТИСТИКА 01.07</h2>
                    <div class="statistic__table">
                        <div class="statistic__row df j-spc-btw a-center">
                            <span>монеты</span>
                            <span class="df a-center">
                                 <img src="images/crystal.svg" alt="crystal">
                                15 000
                            </span>
                        </div>
                        <div class="statistic__row df j-spc-btw a-center">
                            <span>бомбы</span>
                            <span>
                                120 000
                            </span>
                        </div>
                        <div class="statistic__row df j-spc-btw a-center">
                            <span>Алмазы</span>
                            <span>

                             100 000
                            </span>
                        </div>
                        <div class="statistic__row df j-spc-btw a-center">
                            <span>Монстры</span>
                            <span>

                                50 000
                            </span>
                        </div>
                    </div>
                    <button class="btn btn__yellow">ИГРАТЬ</button>
                </div>
            </div>
        </section>
        <section class="leaders">
            <div class="container">
                <div class="leaders__content">
                    <h2 class="leaders__title">лидеры сегодня</h2>
                    <div class="leaders__list">
                        <div class="leaders__item df a-center j-spc-btw">
                            <div class="leaders__left df a-center">
                                <div class="leaders__number">1</div>
                                <div class="leaders__img">
                                    <img src="images/l1.png" alt="">
                                </div>
                            </div>
                            <div class="leaders__right df a-center">
                                <img src="images/crystal.svg" alt="">
                                <span>+500 000</span>
                            </div>
                        </div>
                        <div class="leaders__item df a-center j-spc-btw">
                            <div class="leaders__left df a-center">
                                <div class="leaders__number">2</div>
                                <div class="leaders__img">
                                    <img src="images/l1.png" alt="">
                                </div>
                            </div>
                            <div class="leaders__right df a-center">
                                <img src="images/crystal.svg" alt="">
                                <span>+50 000</span>
                            </div>
                        </div>
                        <div class="leaders__item df a-center j-spc-btw">
                            <div class="leaders__left df a-center">
                                <div class="leaders__number">3</div>
                                <div class="leaders__img">
                                    <img src="images/l1.png" alt="">
                                </div>
                            </div>
                            <div class="leaders__right df a-center">
                                <img src="images/crystal.svg" alt="">
                                <span>+5000</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <div class="footer__content df j-spc-btw a-center">
                <a href="" class="btn btn__img">
                    <img src="images/2.svg" alt="">
                    МАГАЗИН
                </a>
                <a href="" class="btn btn__img">
                    <img src="images/3.svg" alt="">
                    ДРУЗЬЯ
                </a>
                <a href="" class="btn btn__img">
                    <img src="images/1.svg" alt="">
                    ИГРА
                </a>
                <a href="" class="btn btn__img">
                    <img src="images/5.svg" alt="">
                    РЕЙТИНГ
                </a>
                <a href="" class="btn btn__img">
                    <img src="images/4.svg" alt="">
                    ЗАДАНИЯ
                </a>
            </div>
        </div>
    </footer>

</body>
</html>
