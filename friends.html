<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header__content df j-spc-btw a-center">
                <div class="header__user df a-center">
                    <div class="user__avatar">
                        <img src="images/user.png" alt="user">
                    </div>
                    <div class="user__name">Эдвард</div>
                </div>
                <div class="header__points df a-center">
                    <img src="images/crystal.svg" alt="crystal">
                    <span>10</span>
                </div>
            </div>
        </div>
    </header>
    <main>
       <section class="friends">
           <div class="container">
               <div class="friends__content">
                   <h2 class="friends__title">ДРУЗЬЯ</h2>
                   <div class="friends__action df">
                       <div class="friends__item">
                           <p>Пригласи друга <br> из Telegram</p>
                           <div class="coin df a-center" >
                               <img src="images/crystal.svg" alt="">
                               <span>+5</span>
                           </div>
                       </div>
                       <div class="friends__item">
                           <p>Пригласи друга <br>
                               с Telegram Premium</p>
                           <div class="coin df a-center">
                               <img src="images/crystal.svg" alt="">
                               <span>+15</span>
                           </div>
                       </div>
                   </div>
                   <div class="empty__text">Вы пока никого не пригласили</div>
                   <div class="info__text">
                       Пригласите друзей через <br> Telegram и получите награду <br>
                       за каждого, кто присоединится
                   </div>
                   <button class="btn btn__invite df a-center j-center">
                       ПРИГЛАСИТЬ ДРУГА
                       <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none">
                           <path d="M6.5 0C10.0899 0 13 2.91015 13 6.5C13 10.0899 10.0899 13 6.5 13C2.91015 13 0 10.0899 0 6.5C0 2.91015 2.91015 0 6.5 0ZM6.5 1C3.46243 1 1 3.46243 1 6.5C1 9.53757 3.46243 12 6.5 12C9.53757 12 12 9.53757 12 6.5C12 3.46243 9.53757 1 6.5 1ZM7.13477 5.85938H8.66699V7.13184H7.13477V8.66699H5.86523V7.13184H4.33301V5.85938H5.86523V4.33301H7.13477V5.85938Z" fill="#FCE808"/>
                       </svg>
                   </button>
                   <button class="btn btn__copy df a-center j-center">
                       Копировать ссылку
                       <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10" fill="none">
                           <g clip-path="url(#clip0_31_36)">
                               <path d="M8.75 0.3125H3.125C2.60812 0.3125 2.1875 0.733125 2.1875 1.25V2.1875H1.25C0.733125 2.1875 0.3125 2.60812 0.3125 3.125V8.75C0.3125 9.26688 0.733125 9.6875 1.25 9.6875H6.875C7.39188 9.6875 7.8125 9.26688 7.8125 8.75V7.8125H8.75C9.26688 7.8125 9.6875 7.39188 9.6875 6.875V1.25C9.6875 0.733125 9.26688 0.3125 8.75 0.3125ZM9.0625 6.875C9.0625 7.0475 8.92219 7.1875 8.75 7.1875H7.8125V3.125C7.8125 2.60812 7.39188 2.1875 6.875 2.1875H2.8125V1.25C2.8125 1.0775 2.95281 0.9375 3.125 0.9375H8.75C8.92219 0.9375 9.0625 1.0775 9.0625 1.25V6.875Z" fill="white"/>
                           </g>
                           <defs>
                               <clipPath id="clip0_31_36">
                                   <rect width="10" height="10" fill="white"/>
                               </clipPath>
                           </defs>
                       </svg>
                   </button>
               </div>
           </div>
       </section>
    </main>
    <footer>
        <div class="container">
            <div class="footer__content df j-spc-btw a-center">
                <a href="" class="btn btn__img">
                    <img src="images/2.svg" alt="">
                    МАГАЗИН
                </a>
                <a href="" class="btn btn__img">
                    <img src="images/3.svg" alt="">
                    ДРУЗЬЯ
                </a>
                <a href="" class="btn btn__img">
                    <img src="images/1.svg" alt="">
                    ИГРА
                </a>
                <a href="" class="btn btn__img">
                    <img src="images/5.svg" alt="">
                    РЕЙТИНГ
                </a>
                <a href="" class="btn btn__img">
                    <img src="images/4.svg" alt="">
                    ЗАДАНИЯ
                </a>
            </div>
        </div>
    </footer>

</body>
</html>
